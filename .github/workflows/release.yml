name: Release

# Fires when a version tag (vX.Y.Z) is pushed. Creates a GitHub release and
# notifies Packagist so the new version is published automatically.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --no-progress

      - name: Run tests
        run: composer test

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${GITHUB_REF_NAME}" --generate-notes --verify-tag

      - name: Notify Packagist
        env:
          PACKAGIST_USERNAME: ${{ secrets.PACKAGIST_USERNAME }}
          PACKAGIST_TOKEN: ${{ secrets.PACKAGIST_TOKEN }}
        run: |
          if [ -z "${PACKAGIST_TOKEN}" ]; then
            echo "PACKAGIST_TOKEN secret not set — skipping API notify."
            echo "Install the Packagist GitHub hook/app instead, or add the secrets."
            exit 0
          fi
          curl -sf -XPOST -H 'content-type:application/json' \
            "https://packagist.org/api/update-package?username=${PACKAGIST_USERNAME}&apiToken=${PACKAGIST_TOKEN}" \
            -d '{"repository":{"url":"https://github.com/flashmandu-org/flashmandu-app-sdk"}}'
          echo "Notified Packagist."
